# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # C/C++ formatting and static analysis
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file, -i]
        additional_dependencies:
          - clang-format==22.1.0
        types_or: [c, c++]

      - id: cppcheck
        args:
          - --error-exitcode=1
          - --check-level=exhaustive
          - --enable=performance,portability
          - --suppress=missingInclude
          - --suppress=missingIncludeSystem
          - --suppress=*:tests*
        additional_dependencies:
          - cppcheck==1.5.1
        types_or: [c, c++]
        exclude: ^(dependencies/|resources_downloaded/)

  # Python linting
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint --rcfile=.pylintrc
        language: python
        additional_dependencies:
          # Keep this list in sync with scripts/py/requirements-dev.txt.
          - pylint==3.3.8
          - Jinja2==3.1.6
          - pillow==12.1.1
          - numpy==2.1.3
          - resampy==0.4.3
          - soundfile==0.12.1
        types: [python]
        files: \.py$
        exclude: ^(dependencies/|resources_downloaded/)
