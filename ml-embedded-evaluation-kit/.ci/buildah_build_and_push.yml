variables:
  STORAGE_DRIVER: vfs
  BUILDAH_FORMAT: docker
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  PUSH_LATEST: false

.default_buildah:
  image: $CI_REGISTRY_IMAGE/buildah-stable:latest
  stage: buildah_build_and_push
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  rules:
    - changes: [Dockerfile]
      if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event" || $CI_PIPELINE_SOURCE == "web"
      when: always

build-amd64:
  extends: .default_buildah
  tags: [amd64-shared]
  script:
    - buildah build --format=$BUILDAH_FORMAT --storage-driver=$STORAGE_DRIVER --platform=linux/amd64 --target base -t $CI_REGISTRY_IMAGE:amd64-$CI_COMMIT_SHORT_SHA .
    - buildah push $CI_REGISTRY_IMAGE:amd64-$CI_COMMIT_SHORT_SHA

build-arm64:
  extends: .default_buildah
  tags: [arm64-shared]
  script:
    - buildah build --format=$BUILDAH_FORMAT --storage-driver=$STORAGE_DRIVER --platform=linux/arm64/v8 --target base -t $CI_REGISTRY_IMAGE:arm64-$CI_COMMIT_SHORT_SHA .
    - buildah push $CI_REGISTRY_IMAGE:arm64-$CI_COMMIT_SHORT_SHA

create_manifest:
  extends: .default_buildah
  needs: ["build-amd64", "build-arm64"]
  tags: [amd64-shared]
  script:
    - buildah manifest create $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - buildah manifest add $CI_REGISTRY_IMAGE:$IMAGE_TAG docker://$CI_REGISTRY_IMAGE:amd64-$CI_COMMIT_SHORT_SHA
    - buildah manifest add $CI_REGISTRY_IMAGE:$IMAGE_TAG docker://$CI_REGISTRY_IMAGE:arm64-$CI_COMMIT_SHORT_SHA
    - buildah manifest push --all $CI_REGISTRY_IMAGE:$IMAGE_TAG
    # Only push 'latest' manifest on main branch, skip for merge requests
    - |
      if [[ "$CI_COMMIT_BRANCH" == "main" || "$PUSH_LATEST" == "true" ]]; then
        buildah manifest create $CI_REGISTRY_IMAGE:latest
        buildah manifest add $CI_REGISTRY_IMAGE:latest docker://$CI_REGISTRY_IMAGE:amd64-$CI_COMMIT_SHORT_SHA
        buildah manifest add $CI_REGISTRY_IMAGE:latest docker://$CI_REGISTRY_IMAGE:arm64-$CI_COMMIT_SHORT_SHA
        buildah manifest push --all $CI_REGISTRY_IMAGE:latest
      else
        echo "Not main branch, skipping 'latest' manifest push."
      fi
