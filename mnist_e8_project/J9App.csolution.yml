# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.10.0/tools/projmgr/schemas/csolution.schema.json

solution:
  created-for: cmsis-toolbox@2.10.0
  cdefault:

  compiler: GCC

  packs:
    - pack: AlifSemiconductor::Ensemble@2.0.0
    - pack: ARM::CMSIS@6.0.0
    - pack: ARM::CMSIS-Compiler@2.1.0
    - pack: ARM::ethos-u-core-driver@1.26.2

  target-types:
    - type: AE822FA0E5597LS0
      device: AE822FA0E5597LS0:M55_HP
      define:
        - ETHOSU55
        - COPY_VECTORS
        - NPU_QCONFIG: 1
        - NPU_REGIONCFG_0: 1
        - NPU_REGIONCFG_1: 0
        - NPU_REGIONCFG_2: 1
        - AXI_LIMIT0_MEM_TYPE: 3
        - AXI_LIMIT1_MEM_TYPE: 3
        - AXI_LIMIT2_MEM_TYPE: 3
        - AXI_LIMIT3_MEM_TYPE: 3

  build-types:
    - type: Debug
      debug: on
      optimize: none
      misc:
        - for-compiler: GCC
          C-CPP:
            - -include "RTE_Components.h"
          CPP:
            - -std=c++14
            - -fno-exceptions
            - -fno-rtti

    - type: Release
      debug: off
      optimize: speed
      misc:
        - for-compiler: GCC
          C-CPP:
            - -include "RTE_Components.h"
          CPP:
            - -std=c++14
            - -fno-exceptions
            - -fno-rtti

  projects:
    - project: ./M55_HP/J9App.cproject.yml
